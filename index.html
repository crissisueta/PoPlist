<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoPlist UFBA | Ranking de Votação</title>
    <link rel="stylesheet" href="style.css?v=5" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <p class="eyebrow">Projeto público de votação</p>
        <h1>PoPlist UFBA</h1>
        <p class="hero-text">
          Vote uma vez por dia com upvote ou downvote e acompanhe quem está liderando o ranking da lista pop mais babadeira da ufba toda!.
        </p>
        <!----
        <div class="hero-actions">
          <a class="ghost-button link-button" href="suggest.html">Sugerir pessoa</a>
        </div> ---->
      </div>
    </header>

    <main class="container page-content">
      <section class="panel">
        <div class="section-header">
          <div>
            <p class="section-kicker">Destaque</p>
            <h2>Leaderboard</h2>
          </div>
        </div>

        <div id="public-message" class="message hidden" role="alert"></div>
        <div id="top10-loading" class="state-box">Carregando ranking...</div>
        <div id="top10-list" class="top-grid hidden"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js?v=5"></script>
  </body>
</html>
